<!DOCTYPE html>
<html lang="en">    
    <head>
        <title>Student Event Registration</title>
    </head>
    <body>
        <h1>Student Event Registration</h1>
        <form name="myForm" action="submit_registration.php" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>
            <label for="phoneNo">Phone no:</label>
            <input type="tel" id="phoneNo" name="phoneNo" required><br><br>
            
            <label for="event">Select Event:</label>
            <select id="event" name="event" required>
                <option>--Please choose an event--</option>
                <option>Technical Quiz</option>
                <option>Coding Contest</option>
                <option>Paper Presentation</option>
            </select><br><br>
            
            <input type="submit" value="Register">        
    </body>
</form>
<script>
 function validateForm() {
    var name = document.forms["myForm"]["name"].value;
    var email = document.forms["myForm"]["email"].value;
    var phoneNo = document.forms["myForm"]["phoneNo"].value;
    var event = document.forms["myForm"]["event"].value;

    if (name == "" || email == "" || phoneNo == "" || event == "--Please choose an event--") {
        alert("All fields must be filled out");
        return false;
    }
</script>
</html>
